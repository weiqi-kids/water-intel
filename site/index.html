        function updateRangeButtons(view) {
            const container = document.getElementById('stock-range');
            let buttons = '';
            if (view === 'trend' || view === 'heatmap') {
                buttons = '<div class="tab" data-range="1">日</div><div class="tab" data-range="5">週</div><div class="tab active" data-range="20">月</div>';
            } else if (view === 'winrate') {
                buttons = '<div class="tab" data-range="20">1M</div><div class="tab active" data-range="60">3M</div><div class="tab" data-range="120">6M</div><div class="tab" data-range="250">1Y</div>';
            }
            container.innerHTML = buttons;

            container.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const range = parseInt(tab.dataset.range);
                    if (view === 'trend' || view === 'heatmap') {
                        updateStockChartByRange();
                    } else if (view === 'winrate') {
                        const now = state.fullTimeRange[1] || new Date();
                        const msPerDay = 24 * 60 * 60 * 1000;
                        const start = new Date(now.getTime() - range * msPerDay);
                        state.timeRange = [d3.max([start, state.fullTimeRange[0]]), now];
                        renderTimeBrush();
                        updateStockChart();
                        updateEventTimeline();
                        onBrushEnd();
                    }
                });
            });
        }

        async function renderWinRate() {
            const container = document.getElementById('winrate-container');

            // 1. Check selectedCompany
            if (!state.selectedCompany) {
                container.innerHTML = '<div style="color:#999; text-align:center; padding:40px;">請點擊供應鏈節點或選擇公司</div>';
                return;
            }

            const companyId = state.selectedCompany;
            const company = data.companies.find(c => c.id === companyId);
            const prices = data.stockPrices[companyId];

            // 2. Check stock price data
            if (!prices || prices.length < 2) {
                container.innerHTML = '<div style="color:#999; text-align:center; padding:40px;">此公司無股價資料</div>';
                return;
            }

            // 3. Calculate return and MDD
            const [start, end] = state.timeRange;
            const ret = calcReturn(companyId, start, end);
            const mdd = calcMDD(companyId, start, end);
            const smhRet = calcReturn('etf_smh', start, end);
            const smhMdd = calcMDD('etf_smh', start, end);
            const smhRetStr = smhRet !== null ? ` (SMH ${smhRet >= 0 ? '+' : ''}${smhRet.toFixed(1)}%)` : '';
            const smhMddStr = smhMdd !== null ? ` (SMH ${smhMdd.toFixed(1)}%)` : '';
            const isBold = ret !== null && smhRet !== null && ret > smhRet;

            // 4. Filter prices to timeRange and draw chart
            const si = findNearestTradingDay(prices, start, 'after');
            const ei = findNearestTradingDay(prices, end, 'before');
            if (si < 0 || ei < 0 || si >= ei) {
                container.innerHTML = '<div style="color:#999; text-align:center; padding:40px;">此公司無股價資料</div>';
                return;
            }
            const filtered = prices.slice(si, ei + 1);

            const displayName = company?.short_name || company?.name || companyId;

            // Get holdingDays from range button
            const holdingDays = parseInt(document.querySelector('#stock-range .tab.active')?.dataset.range || '60');

            // Build container HTML
            container.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                    <div style="font-size:0.85rem; font-weight:600; color:var(--fg, #1e2030);">${companyLink(companyId, displayName)}</div>
                    <div style="font-size:0.7rem; color:#888;">
                        <span style="color:#eab308">●</span> AR
                        <span style="color:#a855f7; margin-left:6px;">■</span> 庫存
                        <span style="color:#999; margin-left:6px;">- -</span> SMH
                    </div>
                </div>
                <svg id="winrate-price-svg"></svg>
                <div id="winrate-summary" style="display:flex; gap:16px; justify-content:center; margin-top:4px; font-size:0.78rem;"></div>
                <div id="winrate-dist-wrapper" style="margin-top:6px;"></div>
                <div id="winrate-stats" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px 10px; font-size:0.75rem; margin-top:6px;"></div>
            `;

            // ===== PRICE CHART =====
            const chartEl = document.getElementById('stock-chart');
            const chartWidth = chartEl.clientWidth - 30;
            const priceHeight = 220;
            const margin = { top: 15, right: 15, bottom: 25, left: 55 };

            const priceSvg = d3.select('#winrate-price-svg')
                .attr('width', chartWidth)
                .attr('height', priceHeight);

            // Compute SMH data for y-domain consideration
            const smhPrices = data.stockPrices['etf_smh']?.filter(p => p.date >= filtered[0].date && p.date <= filtered[filtered.length - 1].date);
            let smhNormalized = [];
            if (smhPrices && smhPrices.length > 1) {
                const smhBase = smhPrices[0].close;
                const companyBase = filtered[0].close;
                smhNormalized = smhPrices.map(d => ({ date: d.date, close: (d.close / smhBase) * companyBase }));
            }

            const allCloses = filtered.map(d => d.close).concat(smhNormalized.map(d => d.close));

            const x = d3.scaleTime()
                .domain([filtered[0].date, filtered[filtered.length - 1].date])
                .range([margin.left, chartWidth - margin.right]);

            const y = d3.scaleLinear()
                .domain([d3.min(allCloses) * 0.98, d3.max(allCloses) * 1.02])
                .range([priceHeight - margin.bottom, margin.top]);

            // X axis
            priceSvg.append('g')
                .attr('class', 'axis')
                .attr('transform', `translate(0,${priceHeight - margin.bottom})`)
                .call(d3.axisBottom(x).ticks(6).tickFormat(d3.timeFormat('%Y/%m/%d')));

            // Y axis
            priceSvg.append('g')
                .attr('class', 'axis')
                .attr('transform', `translate(${margin.left},0)`)
                .call(d3.axisLeft(y).ticks(5));

            // SMH dashed line (draw first so it's behind)
            if (smhNormalized.length > 1) {
                const smhLine = d3.line()
                    .x(d => x(d.date))
                    .y(d => y(d.close))
                    .curve(d3.curveMonotoneX);
                priceSvg.append('path')
                    .datum(smhNormalized)
                    .attr('fill', 'none')
                    .attr('stroke', '#e8850c')
                    .attr('stroke-width', 1.5)
                    .attr('stroke-dasharray', '5,3')
                    .attr('d', smhLine);
            }

            // Company price line
            const line = d3.line()
                .x(d => x(d.date))
                .y(d => y(d.close))
                .curve(d3.curveMonotoneX);

            priceSvg.append('path')
                .datum(filtered)
                .attr('fill', 'none')
                .attr('stroke', 'var(--hex-brand, #3b82f6)')
                .attr('stroke-width', 1.8)
                .attr('d', line);

            // Summary bar: return and MDD
            const summaryEl = document.getElementById('winrate-summary');
            const retColor = ret !== null && ret >= 0 ? 'var(--hex-pass, #1e8050)' : 'var(--hex-critical, #c93135)';
            const mddColor = 'var(--hex-critical, #c93135)';
            const retText = ret !== null ? `${ret >= 0 ? '+' : ''}${ret.toFixed(2)}%` : 'N/A';
            const mddText = mdd !== null ? `${mdd.toFixed(2)}%` : 'N/A';
            const retStyle = isBold ? `color:${retColor}; font-weight:900` : `color:${retColor}`;
            summaryEl.innerHTML = `
                <span>期間報酬率：<strong style="${retStyle}">${retText}</strong><span style="color:#888"> 大盤${smhRetStr}</span></span>
                <span>最大回撤(MDD)：<strong style="color:${mddColor}">${mddText}</strong><span style="color:#888"> 大盤${smhMddStr}</span></span>
            `;

            // Overlay fundamental markers (AR + Inventory)
            const fh = await ensureFinancialsHistory();
            if (fh) {
                const timeline = getFinancialsTimeline(companyId);
                if (timeline && timeline.quarters && timeline.quarters.length > 1) {
                    const quarters = timeline.quarters;

                    function fmtB(val) {
                        if (val == null) return 'N/A';
                        return (val / 1e9).toFixed(1) + 'B';
                    }

                    function qoq(curr, prev) {
                        if (prev == null || prev === 0) return null;
                        return ((curr - prev) / Math.abs(prev)) * 100;
                    }

                    quarters.forEach((q, idx) => {
                        const qDate = new Date(q.quarter);
                        if (qDate < start || qDate > end) return;
                        if (qDate < filtered[0].date || qDate > filtered[filtered.length - 1].date) return;

                        const pi = findNearestTradingDay(prices, qDate, 'before');
                        if (pi < 0) return;
                        const priceAtQ = prices[pi].close;

                        const prevQ = idx > 0 ? quarters[idx - 1] : null;
                        const arQoQ = prevQ ? qoq(q.ar, prevQ.ar) : null;
                        const invQoQ = prevQ ? qoq(q.inventory, prevQ.inventory) : null;

                        // AR marker (yellow circle)
                        if (q.ar != null) {
                            const arQoQText = arQoQ !== null ? `<br>較上季：${arQoQ >= 0 ? '+' : ''}${arQoQ.toFixed(1)}%${arQoQ > 20 ? ' <span style="color:var(--hex-critical,#c93135)">⚠ 大幅增加</span>' : ''}` : '';
                            const arTooltipHtml = `<strong>● 應收帳款 (AR)</strong><br>季度：${q.quarter}<br>金額：${fmtB(q.ar)}${arQoQText}`;
                            priceSvg.append('circle')
                                .attr('cx', x(qDate) - 10)
                                .attr('cy', y(priceAtQ) - 15)
                                .attr('r', 6)
                                .attr('fill', '#eab308')
                                .attr('stroke', '#a16207')
                                .attr('stroke-width', 1)
                                .style('cursor', 'pointer')
                                .on('mouseenter', function(event) { showTooltip(arTooltipHtml, event); })
                                .on('mouseleave', hideTooltip);
                        }

                        // Inventory marker (purple square)
                        if (q.inventory != null) {
                            const invQoQText = invQoQ !== null ? `<br>較上季：${invQoQ >= 0 ? '+' : ''}${invQoQ.toFixed(1)}%${invQoQ > 20 ? ' <span style="color:var(--hex-critical,#c93135)">⚠ 大幅增加</span>' : ''}` : '';
                            const invTooltipHtml = `<strong>■ 庫存 (Inventory)</strong><br>季度：${q.quarter}<br>金額：${fmtB(q.inventory)}${invQoQText}`;
                            priceSvg.append('rect')
                                .attr('x', x(qDate) + 4)
                                .attr('y', y(priceAtQ) - 20)
                                .attr('width', 10)
                                .attr('height', 10)
                                .attr('fill', '#a855f7')
                                .attr('stroke', '#7e22ce')
                                .attr('stroke-width', 1)
                                .style('cursor', 'pointer')
                                .on('mouseenter', function(event) { showTooltip(invTooltipHtml, event); })
                                .on('mouseleave', hideTooltip);
                        }
                    });
                }
            }

            // ===== DISTRIBUTION CHART =====
            setTimeout(() => {
                const dist = calcDistribution(companyId, 120, holdingDays);
                if (!dist) {
                    document.getElementById('winrate-dist-wrapper').innerHTML = '<div style="color:#999; text-align:center; padding:10px; font-size:0.78rem;">報酬分布資料不足</div>';
                    return;
                }
                const recovery = calcRecovery(companyId, 120, holdingDays);

                const distWidth = chartWidth;
                const distHeight = 180;
                const dm = { top: 8, right: 15, bottom: 25, left: 40 };
                const dw = distWidth - dm.left - dm.right;
                const dh = distHeight - dm.top - dm.bottom;

                const distSvg = d3.select('#winrate-dist-wrapper')
                    .append('svg')
                    .attr('width', distWidth)
                    .attr('height', distHeight);

                const g = distSvg.append('g')
                    .attr('transform', `translate(${dm.left},${dm.top})`);

                // Create histogram bins with 2% bin width
                const returns = dist.returns;
                const minVal = Math.floor(d3.min(returns) / 2) * 2;
                const maxVal = Math.ceil(d3.max(returns) / 2) * 2;
                const thresholds = d3.range(minVal, maxVal + 2, 2);

                const histogram = d3.histogram()
                    .domain([minVal, maxVal + 2])
                    .thresholds(thresholds);

                const bins = histogram(returns);

                const dx = d3.scaleLinear()
                    .domain([minVal, maxVal + 2])
                    .range([0, dw]);

                const dy = d3.scaleLinear()
                    .domain([0, d3.max(bins, d => d.length)])
                    .nice()
                    .range([dh, 0]);

                // Draw bars (green for positive, red for negative)
                g.selectAll('.dist-bar')
                    .data(bins)
                    .enter()
                    .append('rect')
                    .attr('class', 'dist-bar')
                    .attr('x', d => dx(d.x0) + 1)
                    .attr('y', d => dy(d.length))
                    .attr('width', d => Math.max(0, dx(d.x1) - dx(d.x0) - 1))
                    .attr('height', d => dh - dy(d.length))
                    .attr('fill', d => {
                        const midpoint = (d.x0 + d.x1) / 2;
                        return midpoint >= 0 ? '#1e8050' : '#c93135';
                    })
                    .attr('opacity', 0.8);

                // SMH distribution overlay (dashed line)
                const smhDist = calcDistribution('etf_smh', 120, holdingDays);
                if (smhDist) {
                    const smhBins = histogram(smhDist.returns);
                    const smhYMax = d3.max(smhBins, d => d.length);
                    const smhYScale = d3.scaleLinear().domain([0, smhYMax]).range([dh, 0]);
                    const smhLine = d3.line()
                        .x(d => dx((d.x0 + d.x1) / 2))
                        .y(d => smhYScale(d.length))
                        .curve(d3.curveMonotoneX);
                    g.append('path')
                        .datum(smhBins.filter(d => d.length > 0))
                        .attr('fill', 'none')
                        .attr('stroke', '#e8850c')
                        .attr('stroke-width', 1.5)
                        .attr('stroke-dasharray', '5,3')
                        .attr('d', smhLine);
                }

                // Zero line (dashed vertical)
                if (minVal < 0 && maxVal + 2 > 0) {
                    g.append('line')
                        .attr('x1', dx(0))
                        .attr('x2', dx(0))
                        .attr('y1', 0)
                        .attr('y2', dh)
                        .attr('stroke', '#333')
                        .attr('stroke-width', 1)
                        .attr('stroke-dasharray', '4,3');
                }

                // X-axis with percentile tick marks
                const percentiles = [
                    { p: dist.p5, label: '5th' },
                    { p: dist.p25, label: '25th' },
                    { p: dist.median, label: '50th' },
                    { p: dist.p75, label: '75th' },
                    { p: dist.p95, label: '95th' }
                ];

                const xAxisG = g.append('g')
                    .attr('transform', `translate(0,${dh})`);

                percentiles.forEach(pt => {
                    const xPos = dx(pt.p);
                    if (xPos >= 0 && xPos <= dw) {
                        xAxisG.append('line')
                            .attr('x1', xPos)
                            .attr('x2', xPos)
                            .attr('y1', 0)
                            .attr('y2', 5)
                            .attr('stroke', '#333');

                        xAxisG.append('text')
                            .attr('x', xPos)
                            .attr('y', 16)
                            .attr('text-anchor', 'middle')
                            .attr('font-size', '9px')
                            .attr('fill', '#666')
                            .attr('font-weight', pt.label === '50th' ? 'bold' : 'normal')
                            .text(pt.p.toFixed(1) + '%');
                    }
                });

                // Y-axis
                g.append('g')
                    .call(d3.axisLeft(dy).ticks(3))
                    .selectAll('text')
                    .attr('font-size', '9px');

                // Holding period label
                const holdLabel = holdingDays <= 20 ? '1M' : holdingDays <= 60 ? '3M' : holdingDays <= 120 ? '6M' : '1Y';
                g.append('text')
                    .attr('x', dw)
                    .attr('y', 12)
                    .attr('text-anchor', 'end')
                    .attr('font-size', '10px')
                    .attr('fill', '#888')
                    .text(`持有 ${holdingDays} 天 (${holdLabel}) 報酬分布`);

                // Stats grid
                const statsEl = document.getElementById('winrate-stats');
                const winColor = dist.winRate >= 50 ? '#1e8050' : '#c93135';
                let statsHtml = '';
                statsHtml += `<div>勝率: <b style="color:${winColor};">${dist.winRate.toFixed(1)}%</b></div>`;
                statsHtml += `<div>中位數: <b>${dist.median.toFixed(2)}%</b></div>`;
                statsHtml += `<div>最大虧損: <b style="color:#c93135;">${dist.maxLoss.toFixed(2)}%</b></div>`;
                statsHtml += `<div>跌&gt;10%: <b>${dist.below10Pct.toFixed(1)}%</b></div>`;
                statsHtml += `<div>漲&gt;10%: <b>${dist.above10Pct.toFixed(1)}%</b></div>`;
                if (recovery) {
                    statsHtml += `<div>回撤恢復: <b>${recovery.avg}天</b></div>`;
                }
                statsEl.innerHTML = statsHtml;
            }, 10);
        }

        function updateStockChartByRange() {
            const days = parseInt(document.querySelector('#stock-range .tab.active')?.dataset.range || '20');
            const now = state.fullTimeRange[1] || new Date();
            const msPerDay = 24 * 60 * 60 * 1000;
            const lookbackDays = days === 1 ? 5 : days === 5 ? 30 : 90;
            const start = new Date(now.getTime() - lookbackDays * msPerDay);
            state.timeRange = [d3.max([start, state.fullTimeRange[0]]), now];
            updateStockChart();
            renderTimeBrush();
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmap-container');

            // 計算每家公司的漲跌幅
            const changes = [];
            data.companies.forEach(company => {
                const prices = data.stockPrices[company.id];
                if (!prices || prices.length < 2) return;

                const si = findNearestTradingDay(prices, state.timeRange[0], 'after');
                const ei = findNearestTradingDay(prices, state.timeRange[1], 'before');
                if (si < 0 || ei < 0 || si >= ei) return;
                const prev = prices[si];
                const latest = prices[ei];
                const pct = ((latest.close - prev.close) / prev.close) * 100;
                changes.push({
                    id: company.id,
                    name: company.short_name || company.name,
                    position: company.position,
                    role: company.role,
                    change: pct,
                    price: latest.close,
                });
            });

            if (changes.length === 0) {
                container.innerHTML = '<div style="color:#999; text-align:center; padding:40px;">無股價資料</div>';
                return;
            }

            // 按供應鏈分組
            const groups = [
                { label: '上游（設備/材料/EDA）', position: 'upstream' },
                { label: '中游（製造/代工/封測）', position: 'midstream' },
                { label: '下游（AI晶片/系統/CSP）', position: 'downstream' },
            ];

            // 計算色塊顏色
            // OKLCH-aligned heatmap colors (hex fallback)
            // critical=#c93135 (hue 25), neutral=#dfe0e5, pass=#1e8050 (hue 150)
            function changeColor(pct) {
                const clamped = Math.max(-5, Math.min(5, pct));
                const t = (clamped + 5) / 10; // 0=critical red, 0.5=neutral, 1=pass green
                if (t < 0.5) {
                    const f = t * 2; // 0→1
                    const r = Math.round(201 + f * (223 - 201));
                    const g = Math.round(49 + f * (224 - 49));
                    const b = Math.round(53 + f * (229 - 53));
                    return { bg: `rgb(${r},${g},${b})`, text: f < 0.5 ? '#fff' : '#1e2030' };
                } else {
                    const f = (t - 0.5) * 2; // 0→1
                    const r = Math.round(223 - f * (223 - 30));
                    const g = Math.round(224 - f * (224 - 128));
                    const b = Math.round(229 - f * (229 - 80));
                    return { bg: `rgb(${r},${g},${b})`, text: f > 0.4 ? '#fff' : '#1e2030' };
                }
            }

            let html = '';
            groups.forEach(group => {
                const items = changes.filter(c => c.position === group.position)
                    .sort((a, b) => b.change - a.change);
                if (items.length === 0) return;

                const cols = Math.min(items.length, 6);
                html += `<div class="heatmap-section-label">${group.label}</div>`;
                html += `<div style="display:grid; grid-template-columns:repeat(${cols}, 1fr); gap:3px;">`;
                items.forEach(item => {
                    const { bg, text } = changeColor(item.change);
                    const sign = item.change >= 0 ? '+' : '';
                    html += `
                        <div class="heatmap-cell" data-id="${item.id}" data-name="${item.name}" data-role="${item.role}" data-change="${item.change.toFixed(2)}" style="background:${bg}; color:${text};">
                            <span class="heatmap-name">${item.name}</span>
                            <span class="heatmap-value">${sign}${item.change.toFixed(1)}%</span>
                        </div>`;
                });
                html += '</div>';
            });

            container.innerHTML = html;

            container.querySelectorAll('.heatmap-cell').forEach(cell => {
                const id = cell.dataset.id;
                const name = cell.dataset.name;
                const role = cell.dataset.role;
                const change = parseFloat(cell.dataset.change);
                const sign = change >= 0 ? '+' : '';

                cell.addEventListener('mouseenter', (event) => {
                    // 計算時間範圍文字
                    const fmt = d => d.toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'});
                    const rangeText = `${fmt(state.timeRange[0])} ~ ${fmt(state.timeRange[1])}`;

                    let tip = `<strong>${companyLink(id, name)}</strong>`;
                    tip += `<span style="color:var(--text-muted,#999)">（${role}）</span><br>`;
                    tip += `<span style="color:var(--text-muted,#999)">期間：${rangeText}</span><br><br>`;
                    tip += `本公司在這段期間的股價漲跌：<strong>${sign}${change.toFixed(2)}%</strong><br>`;
                    if (state.smhReturn !== null) {
                        const excess = change - state.smhReturn;
                        const exColor = excess >= 0 ? 'var(--hex-pass, #1e8050)' : 'var(--hex-critical, #c93135)';
                        const smhSign = state.smhReturn >= 0 ? '+' : '';
                        tip += `同期間半導體大盤（SMH ETF）漲跌：<strong>${smhSign}${state.smhReturn.toFixed(2)}%</strong><br><br>`;
                        if (excess >= 0) {
                            tip += `<span style="color:${exColor}">→ 贏大盤 ${excess.toFixed(2)}%（表現優於大盤）</span>`;
                        } else {
                            tip += `<span style="color:${exColor}">→ 輸大盤 ${Math.abs(excess).toFixed(2)}%（漲幅不及大盤）</span>`;
                        }
                    }
                    showTooltip(tip, event);
                });
                cell.addEventListener('mouseleave', () => hideTooltip());
                cell.addEventListener('click', () => selectCompany(id));
            });
        }

        // Start
        loadData();
    </script>

    <!-- 意見回饋 Modal -->
    <div id="feedback-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center;">
        <div style="background: white; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin: 0; font-size: 1.25rem;">意見回饋</h2>
                <button onclick="closeFeedback()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666;">&times;</button>
            </div>

            <div id="feedback-step1">
                <p style="color: #666; margin-bottom: 16px;">點擊下方按鈕擷取目前畫面，或直接輸入意見</p>
                <button onclick="captureScreen()" style="width: 100%; padding: 12px; background: var(--color-brand, #3b82f6); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-bottom: 16px;">📷 擷取畫面截圖</button>
            </div>

            <div id="feedback-screenshot" style="display: none; margin-bottom: 16px;">
                <p style="color: #666; margin-bottom: 8px;">截圖預覽（可在上面圈選標記）：</p>
                <div style="position: relative; border: 1px solid var(--border-subtle, #d5d6da); border-radius: 8px; overflow: hidden;">
                    <canvas id="feedback-canvas" style="width: 100%; cursor: crosshair;"></canvas>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 8px;">
                    <button onclick="clearDrawing()" style="padding: 8px 16px; background: var(--bg-muted, #f0f2f5); border: 1px solid var(--border-subtle, #d5d6da); border-radius: 6px; cursor: pointer;">清除標記</button>
                    <button onclick="retakeScreenshot()" style="padding: 8px 16px; background: var(--bg-muted, #f0f2f5); border: 1px solid var(--border-subtle, #d5d6da); border-radius: 6px; cursor: pointer;">重新截圖</button>
                </div>
            </div>

            <div style="margin-bottom: 16px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500;">您的意見或建議：</label>
                <textarea id="feedback-message" rows="4" style="width: 100%; padding: 12px; border: 1px solid var(--border-subtle, #d5d6da); border-radius: 8px; font-size: 1rem; resize: vertical; box-sizing: border-box;" placeholder="請描述您遇到的問題或建議..."></textarea>
            </div>

            <div id="feedback-status" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 16px;"></div>

            <div style="display: flex; gap: 12px;">
                <button onclick="submitFeedback(false)" style="flex: 1; padding: 12px; background: var(--color-brand, #3b82f6); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;">送出</button>
                <button onclick="submitFeedback(true)" style="flex: 1; padding: 12px; background: var(--color-sponsor, #ff5e5b); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;">送出 + 贊助 ☕</button>
            </div>
        </div>
    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        const FEEDBACK_API = 'https://feedback-api.lightman-chang.workers.dev/submit';
        let feedbackCanvas, feedbackCtx;
        let isDrawing = false;
        let screenshotData = null;

        function openFeedback() {
            document.getElementById('feedback-modal').style.display = 'flex';
            document.getElementById('feedback-step1').style.display = 'block';
            document.getElementById('feedback-screenshot').style.display = 'none';
            document.getElementById('feedback-message').value = '';
            document.getElementById('feedback-status').style.display = 'none';
            screenshotData = null;
        }

        function closeFeedback() {
            document.getElementById('feedback-modal').style.display = 'none';
        }

        async function captureScreen() {
            document.getElementById('feedback-modal').style.display = 'none';

            await new Promise(r => setTimeout(r, 100));

            try {
                const canvas = await html2canvas(document.body, {
                    useCORS: true,
                    allowTaint: true,
                    scale: 0.5
                });

                document.getElementById('feedback-modal').style.display = 'flex';
                document.getElementById('feedback-step1').style.display = 'none';
                document.getElementById('feedback-screenshot').style.display = 'block';

                feedbackCanvas = document.getElementById('feedback-canvas');
                feedbackCanvas.width = canvas.width;
                feedbackCanvas.height = canvas.height;
                feedbackCtx = feedbackCanvas.getContext('2d');
                feedbackCtx.drawImage(canvas, 0, 0);

                screenshotData = canvas.toDataURL('image/png');

                setupDrawing();
            } catch (err) {
                console.error('Screenshot failed:', err);
                document.getElementById('feedback-modal').style.display = 'flex';
                showStatus('截圖失敗，請直接輸入意見', 'error');
            }
        }

        function setupDrawing() {
            let lastX, lastY;

            feedbackCanvas.onmousedown = (e) => {
                isDrawing = true;
                const rect = feedbackCanvas.getBoundingClientRect();
                const scaleX = feedbackCanvas.width / rect.width;
                const scaleY = feedbackCanvas.height / rect.height;
                lastX = (e.clientX - rect.left) * scaleX;
                lastY = (e.clientY - rect.top) * scaleY;
            };

            feedbackCanvas.onmousemove = (e) => {
                if (!isDrawing) return;
                const rect = feedbackCanvas.getBoundingClientRect();
                const scaleX = feedbackCanvas.width / rect.width;
                const scaleY = feedbackCanvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                feedbackCtx.beginPath();
                feedbackCtx.moveTo(lastX, lastY);
                feedbackCtx.lineTo(x, y);
                feedbackCtx.strokeStyle = '#ff0000';
                feedbackCtx.lineWidth = 4;
                feedbackCtx.lineCap = 'round';
                feedbackCtx.stroke();

                lastX = x;
                lastY = y;
            };

            feedbackCanvas.onmouseup = () => isDrawing = false;
            feedbackCanvas.onmouseleave = () => isDrawing = false;
        }

        function clearDrawing() {
            if (screenshotData) {
                const img = new Image();
                img.onload = () => {
                    feedbackCtx.clearRect(0, 0, feedbackCanvas.width, feedbackCanvas.height);
                    feedbackCtx.drawImage(img, 0, 0);
                };
                img.src = screenshotData;
            }
        }

        function retakeScreenshot() {
            captureScreen();
        }

        function showStatus(message, type) {
            const status = document.getElementById('feedback-status');
            status.style.display = 'block';
            status.textContent = message;
            status.style.background = type === 'error' ? '#fee2e2' : type === 'success' ? '#d1fae5' : '#e0e7ff';
            status.style.color = type === 'error' ? '#dc2626' : type === 'success' ? '#059669' : '#4338ca';
        }

        async function submitFeedback(withSponsor) {
            const message = document.getElementById('feedback-message').value.trim();

            if (!message) {
                showStatus('請輸入意見內容', 'error');
                return;
            }

            showStatus('正在送出...', 'info');

            const finalScreenshot = feedbackCanvas ? feedbackCanvas.toDataURL('image/png') : null;

            try {
                const response = await fetch(FEEDBACK_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        screenshot: finalScreenshot,
                        message: message,
                        url: window.location.href
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showStatus('感謝您的意見！已成功送出', 'success');

                    if (withSponsor) {
                        setTimeout(() => {
                            window.open('https://ko-fi.com/lightchang', '_blank');
                            closeFeedback();
                        }, 1000);
                    } else {
                        setTimeout(closeFeedback, 2000);
                    }
                } else {
                    showStatus(result.error || '送出失敗，請稍後再試', 'error');
                }
            } catch (err) {
                console.error('Submit failed:', err);
                showStatus('網路錯誤，請稍後再試', 'error');
            }
        }

        document.getElementById('feedback-modal').onclick = (e) => {
            if (e.target.id === 'feedback-modal') closeFeedback();
        };
    </script>
</body>
